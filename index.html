    <!-- model-viewer — Google's 3D web component -->
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
</head>
<body>

<script src="nav.js"></script>

<div id="model-progress-bar">
    <div id="model-progress-fill"></div>
</div>

<main class="hero">
    <div class="hero-left">
        <h1 class="hero-title">LA<br><span class="accent">PILA</span></h1>
    </div>

    <div class="hero-right">
        <model-viewer
                alt="La Pila — modello 3D"
                loading="lazy"
                auto-rotate
                auto-rotate-delay="2000"
                rotation-per-second="5deg"
                camera-controls
                camera-orbit="120deg"
                touch-action="pan-y"
                environment-image="neutral"
                shadow-intensity="1"
                shadow-softness="0.7"
                exposure="0.5"
                tone-mapping="commerce"
                style="width:100%;height:100%;background:transparent;"
        ></model-viewer>
    </div>

    <script>
        // ── Modelli casuali homepage ──────────────────────────────────────
        // Aggiungi qui i file .glb presenti in assets/models/pages/home/
        const HOME_MODELS = [
          //  "assets/models/pages/home/lapilahome.glb",
            "assets/models/pages/home/pilabase.glb",
        ];

        const SESSION_KEY = "home_model";
        let chosen = sessionStorage.getItem(SESSION_KEY);
        if (!chosen || !HOME_MODELS.includes(chosen)) {
            chosen = HOME_MODELS[Math.floor(Math.random() * HOME_MODELS.length)];
            sessionStorage.setItem(SESSION_KEY, chosen);
        }

        const mv = document.querySelector('model-viewer');
        mv.src = chosen;
        mv.style.pointerEvents = 'none';
        // ─────────────────────────────────────────────────────────────────

        const bar = document.getElementById('model-progress-bar');
        const fill = document.getElementById('model-progress-fill');
        mv.addEventListener('progress', e => {
            const p = e.detail.totalProgress * 100;
            fill.style.width = p + '%';
        });
        mv.addEventListener('load', () => {
            mv.style.pointerEvents = '';
            bar.style.opacity = '0';
            setTimeout(() => bar.style.display = 'none', 400);
        });
    </script>

    <div class="hero-bar">
        <p class="hero-desc">
            Modelli 3D stampati, colorati a mano,<br>
            incollati sui muri delle città.
        </p>
        <a href="mappa.html" class="btn">Vedi la mappa →</a>
    </div>
</main>

</body>
</html>
