<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Pila — Arte urbana 3D sui muri del mondo</title>

  <!-- SEO -->
  <meta name="description" content="La Pila è un progetto di arte urbana: modelli 3D stampati, colorati a mano e incollati sui muri delle città del mondo.">
  <meta name="author" content="La Pila">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://lapilart.github.io/lapila.art/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="La Pila">
  <meta property="og:title" content="La Pila — Arte urbana 3D sui muri del mondo">
  <meta property="og:description" content="Modelli 3D stampati, colorati a mano e incollati sui muri delle città del mondo.">
  <meta property="og:url" content="https://lapilart.github.io/lapila.art/">
  <meta property="og:locale" content="it_IT">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="La Pila — Arte urbana 3D">
  <meta name="twitter:description" content="Modelli 3D stampati, colorati a mano e incollati sui muri delle città del mondo.">

  <!-- Tema e favicon -->
  <meta name="theme-color" content="#111111">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="stylesheet" href="style.css">
  <!-- model-viewer — Google's 3D web component -->
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
</head>
<body>

  <script src="nav.js"></script>

  <main class="hero">
    <div class="hero-left">
      <h1 class="hero-title">LA<br><span class="accent">PILA</span></h1>
    </div>

    <div class="hero-right">
      <model-viewer
        src="lapilahome.glb"
        alt="La Pila — modello 3D"
        auto-rotate
        auto-rotate-delay="2000"
        rotation-per-second="5deg"
        camera-controls
        camera-orbit="120deg"
        touch-action="pan-y"
        environment-image="neutral"
        shadow-intensity="1"
        shadow-softness="0.7"
        exposure="0.8"
        tone-mapping="commerce"
        style="width:100%;height:100%;background:transparent;"
      ></model-viewer>
    </div>

    <div class="hero-bar">
      <p class="hero-desc">
        Modelli 3D stampati, colorati a mano,<br>
        incollati sui muri delle città del mondo.
      </p>
      <a href="mappa.html" class="btn">Vedi la mappa →</a>
    </div>
  </main>

</body>
</html>
