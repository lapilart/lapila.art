<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelli — La Pila</title>

  <!-- SEO -->
  <meta name="description" content="I modelli 3D de La Pila: oggetti stampati, colorati a mano e incollati sui muri delle città.">
  <meta name="author" content="La Pila">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://lapilart.github.io/lapila.art/modelli.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="La Pila">
  <meta property="og:title" content="Modelli — La Pila">
  <meta property="og:description" content="I modelli 3D de La Pila: oggetti stampati, colorati a mano e incollati sui muri delle città.">
  <meta property="og:url" content="https://lapilart.github.io/lapila.art/modelli.html">
  <meta property="og:locale" content="it_IT">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Modelli — La Pila">
  <meta name="twitter:description" content="I modelli 3D de La Pila: oggetti stampati, colorati a mano e incollati sui muri delle città.">

  <!-- Tema e favicon -->
  <meta name="theme-color" content="#111111">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <script src="nav.js"></script>

  <div class="modelli-wrap">
    <span class="manifesto-label">Modelli</span>
    <div id="modelli-grid" class="modelli-grid"></div>
  </div>

  <script src="modelli.js"></script>
  <script>
    const grid = document.getElementById('modelli-grid');

    MODELLI.forEach(m => {
      const card = document.createElement('div');
      card.className = 'modello-card';

      // ── Galleria immagini ──
      let mediaHTML = '';
      if (m.images && m.images.length > 0) {
        if (m.images.length === 1) {
          mediaHTML = `
            <div class="modello-media">
              <img src="${m.images[0]}" alt="${m.title}" class="modello-img">
            </div>`;
        } else {
          const slides = m.images.map((src, i) =>
            `<img src="${src}" alt="${m.title} ${i + 1}" class="modello-img modello-slide${i === 0 ? ' active' : ''}" data-index="${i}">`
          ).join('');
          const dots = m.images.map((_, i) =>
            `<button class="modello-dot${i === 0 ? ' active' : ''}" data-index="${i}" aria-label="Immagine ${i + 1}"></button>`
          ).join('');
          mediaHTML = `
            <div class="modello-media modello-slider" data-current="0">
              ${slides}
              <button class="modello-arrow modello-arrow-prev" aria-label="Precedente">&#8592;</button>
              <button class="modello-arrow modello-arrow-next" aria-label="Successiva">&#8594;</button>
              <div class="modello-dots">${dots}</div>
            </div>`;
        }
      } else {
        mediaHTML = `<div class="modello-media modello-media--empty"></div>`;
      }

      // ── Download ──
      const downloadHTML = m.downloadable
        ? `<a class="modello-download" href="${m.file}" download>Scarica modello</a>`
        : '';

      card.innerHTML = `
        ${mediaHTML}
        <div class="modello-info">
          <h2 class="modello-title">${m.title}</h2>
          <p class="modello-desc">${m.description}</p>
          ${downloadHTML}
        </div>
      `;
      grid.appendChild(card);
    });

    // ── Logica slider ──
    document.querySelectorAll('.modello-slider').forEach(slider => {
      let current = 0;
      const slides = slider.querySelectorAll('.modello-slide');
      const dots = slider.querySelectorAll('.modello-dot');
      const total = slides.length;

      function goTo(n) {
        slides[current].classList.remove('active');
        dots[current].classList.remove('active');
        current = (n + total) % total;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
      }

      slider.querySelector('.modello-arrow-prev').addEventListener('click', () => goTo(current - 1));
      slider.querySelector('.modello-arrow-next').addEventListener('click', () => goTo(current + 1));
      dots.forEach(dot => dot.addEventListener('click', () => goTo(+dot.dataset.index)));
    });
  </script>

</body>
</html>
